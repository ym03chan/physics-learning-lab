<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>撞擊力測試實驗室｜Impact Force Lab</title>
  <style>
    :root {
      --bg: #f4f7fc;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d1d9e6;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --green: #059669;
      --green-soft: #ecfdf5;
      --red: #dc2626;
      --red-soft: #fef2f2;
      --amber: #d97706;
      --amber-soft: #fffbeb;
      --shadow: 0 12px 32px rgba(27, 39, 74, 0.08);
      --shadow-hover: 0 20px 45px rgba(27, 39, 74, 0.12);
      --radius: 22px;
    }

    /* INDESTRUCTIBLE GLOBAL RESET */
    * {
      box-sizing: border-box;
      word-break: break-word !important; 
      overflow-wrap: anywhere !important;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 32rem),
        radial-gradient(circle at top right, rgba(5, 150, 105, 0.06), transparent 30rem),
        var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      display: block; 
    }

    button, select, input { font: inherit; outline: none; }

    .app-container {
      width: 100%;
      max-width: 1240px;
      margin: 0 auto;
      padding: 16px;
      display: block;
    }

    .top-utility-bar {
      display: flex;
      justify-content: flex-end;
      padding-bottom: 12px;
      padding-right: 12px;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }
    
    .lang-btn:hover {
      color: var(--blue);
      text-decoration: underline;
    }

    .hero {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 24px 30px;
      gap: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      color: var(--blue);
      background: var(--blue-soft);
      border: 1px solid rgba(37, 99, 235, 0.1);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      letter-spacing: -0.03em;
      line-height: 1.1;
      font-weight: 900;
    }

    .hero p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 800px;
    }

    .pill-btn, .primary-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 24px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .pill-btn:hover, .primary-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 8px 20px rgba(27,39,74,0.12); 
    }
    
    .primary-btn { 
      background: var(--blue); 
      color: #fff; 
      border-color: var(--blue); 
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
    }
    .primary-btn:hover { box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }

    .mode-tabs {
      margin: 24px 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .tab {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      padding: 16px 20px;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 4px 15px rgba(27,39,74,0.03);
      min-height: 96px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .tab::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: transparent; transition: background 0.3s ease;
    }

    .tab:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); background: #fff; }
    .tab.active { 
      outline: 2px solid var(--blue); 
      border-color: transparent; 
      background: #fff; 
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1);
    }
    .tab.active::before { background: var(--blue); }
    
    .tab strong { display: block; font-size: 1.1rem; margin-bottom: 6px; font-weight: 800; color: #111827; }
    .tab span { color: var(--muted); font-size: 0.95rem; line-height: 1.4; font-weight: 500; }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.95fr) minmax(320px, 0.95fr);
      gap: 20px;
      align-items: start;
    }

    .card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      background: rgba(248, 250, 252, 0.5);
    }

    .card-head h2, .panel-title { margin: 0; font-size: 1.15rem; font-weight: 800; color: #0f172a; }

    .stage-actions {
      display: flex;
      gap: 12px;
      padding: 16px 20px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }
    .stage-actions .primary-btn { flex: 2; font-size: 1.1rem; }
    .stage-actions .pill-btn { flex: 1; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--amber-soft);
      color: #b45309;
      font-weight: 800;
      font-size: 0.85rem;
      white-space: nowrap;
      border: 1px solid rgba(217, 119, 6, 0.2);
    }

    .scene-wrap { padding: 20px; flex: 1; }
    .scene {
      width: 100%;
      height: auto;
      display: block;
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.04);
    }

    .graph-wrap { padding: 0 20px 20px; }
    .graph { 
      width: 100%; 
      height: auto; 
      display: block; 
      border-radius: 16px; 
      background: #fff; 
      border: 1px solid var(--line); 
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
    }

    .side { display: grid; gap: 20px; position: sticky; top: 16px; }
    .panel { padding: 20px; }

    .equation-card {
      background: #0f172a;
      color: #f8fafc;
      border-radius: 18px;
      padding: 16px 20px;
      margin-bottom: 16px;
      line-height: 1.6;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1), 0 8px 20px rgba(15, 23, 42, 0.15);
      position: relative;
      overflow: hidden;
    }
    .equation-card .small { color: #94a3b8; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .equation-card .big { font-size: 1.3rem; font-weight: 900; margin-bottom: 8px; color: #fff; }

    .readout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mini-card { border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .mini-card h3 { margin: 0 0 6px; font-size: 0.9rem; color: var(--muted); font-weight: 800; }
    .mini-card .value { font-size: 1.4rem; font-weight: 900; color: #0f172a; }
    .mini-card .note { color: var(--muted); font-size: 0.9rem; margin-top: 6px; line-height: 1.5; font-weight: 500; }

    .control-group { display: grid; gap: 16px; }
    .control { border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .control label { font-weight: 800; color: #1e293b; display: block; margin-bottom: 8px; }
    
    select { 
      width: 100%; padding: 10px 14px; border: 1px solid var(--line); 
      border-radius: 12px; background: #f8fafc; color: var(--text); font-weight: 700; cursor: pointer; 
    }

    .qa-options { display: grid; gap: 10px; margin-top: 14px; }
    .qa-options button {
      text-align: left; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
      background: #fff; cursor: pointer; font-weight: 700; color: #334155; transition: all 0.2s ease;
    }
    .qa-options button:hover { border-color: #94a3b8; background: #f8fafc; }
    .qa-options button.correct { border-color: rgba(5,150,105,0.6); background: var(--green-soft); color: #065f46; box-shadow: 0 2px 8px rgba(5,150,105,0.15); }
    .qa-options button.wrong { border-color: rgba(220,38,38,0.6); background: var(--red-soft); color: #991b1b; box-shadow: 0 2px 8px rgba(220,38,38,0.15); }
    
    .feedback { margin-top: 12px; font-weight: 800; font-size: 0.95rem; line-height: 1.5; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.5); }

    .explain-box { display: flex; flex-direction: column; gap: 8px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 14px; border-radius: 16px; line-height: 1.8; font-weight: 700; color:#334155; }
    
    .blank-select { 
      display: inline-block; width: auto; min-width: 90px; border: none; border-bottom: 2px solid var(--blue); 
      background: rgba(37,99,235,0.05); color: var(--blue-dark); font-weight: 900; font-size: 15px; 
      padding: 2px 24px 2px 8px; margin: 0 4px; border-radius: 4px 4px 0 0; cursor: pointer; appearance: auto; 
    }
    .blank-select.correct { border-bottom-color: var(--green); color: var(--green); background: var(--green-soft); }
    .blank-select.wrong { border-bottom-color: var(--red); color: var(--red); background: var(--red-soft); }

    @media (max-width: 980px) {
      .hero, .workspace { grid-template-columns: 1fr; }
      .side { position: static; }
      .mode-tabs { grid-template-columns: 1fr; }
      .top-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-utility-bar">
      <button class="lang-btn" id="langBtn">🌐 English</button>
    </div>

    <header class="hero">
      <div>
        <div class="eyebrow" data-i18n="eyebrow">⚡ 物理互動實驗室</div>
        <h1 data-i18n="title">Impulse Lab：動量與撞擊力</h1>
        <p data-i18n="subtitle">比較「硬地與軟墊」和「汽車緩衝區」。重點：同一個物體最後停下，動量改變必定相同；停下時間越長，平均力越小。</p>
      </div>
    </header>

    <nav class="mode-tabs" id="modeTabs">
      <button class="tab active" data-mode="egg">
        <strong data-i18n="tabEggTitle">A｜情境一：硬地與軟墊</strong>
        <span data-i18n="tabEggSub">雞蛋由相同高度跌下，撞地前速率相同，最後都停下。</span>
      </button>
      <button class="tab" data-mode="car">
        <strong data-i18n="tabCarTitle">B｜情境二：汽車緩衝區</strong>
        <span data-i18n="tabCarSub">同一輛汽車以相同速度前進，最後停下。比較堅硬車身與可摺曲車身。</span>
      </button>
    </nav>

    <main class="workspace">
      <!-- SVG Visual Stage Area -->
      <section class="card">
        <div class="card-head">
          <div><h2 id="sceneTitle">情境一：硬地與軟墊</h2></div>
          <div class="badge" id="badgeTxt">相同 Δp → 時間較長 → 力較小</div>
        </div>
        
        <div class="stage-actions">
          <button class="primary-btn" id="playBtn">▶ 播放模擬</button>
          <button class="pill-btn" id="resetBtn" data-i18n="reset">重設</button>
        </div>
        
        <div class="scene-wrap">
          <svg class="scene" id="scene" viewBox="0 0 900 360" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        
        <div class="graph-wrap">
          <svg class="graph" id="graph" viewBox="0 0 900 330" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </section>

      <!-- Controls & Reflect Area -->
      <aside class="side">
        <section class="card">
          <div class="card-head"><h2 class="panel-title" data-i18n="panelReadout">實驗面板</h2></div>
          <div class="panel">
            <div class="equation-card">
              <div class="small" data-i18n="coreFormula">核心公式</div>
              <div class="big">F<sub>avg</sub> = Δp / Δt</div>
              <div data-i18n="coreDesc">相同 Δp；Δt 越長，F<sub>avg</sub> 越小。</div>
            </div>
            <div id="readouts" class="readout-grid">
              <div class="mini-card"><h3 id="readoutLabelA">A 硬地 / 堅硬車身</h3><div class="value" id="valA">—</div><div class="note" data-i18n="avgForceNote">平均力</div></div>
              <div class="mini-card"><h3 id="readoutLabelB">B 軟墊 / 可摺曲車身</h3><div class="value" id="valB">—</div><div class="note" data-i18n="avgForceNote">平均力</div></div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-head"><h2 class="panel-title" data-i18n="panelControl">參數控制</h2></div>
          <div class="panel">
            <div id="eggControls" class="control-group">
              <div class="control">
                <label data-i18n="eggCtrl1">下跌高度 (決定初速)</label>
                <select id="heightPreset">
                  <option value="0.5" data-i18n="eggOptH1">低：0.5 m</option>
                  <option value="1.0" selected data-i18n="eggOptH2">中：1.0 m</option>
                  <option value="1.5" data-i18n="eggOptH3">高：1.5 m</option>
                </select>
              </div>
              <div class="control">
                <label data-i18n="eggCtrl2">B 軟墊厚度 (影響停下時間)</label>
                <select id="matPreset">
                  <option value="0.06" data-i18n="eggOptM1">薄軟墊：0.06 s</option>
                  <option value="0.10" selected data-i18n="eggOptM2">普通軟墊：0.10 s</option>
                  <option value="0.16" data-i18n="eggOptM3">厚軟墊：0.16 s</option>
                </select>
              </div>
            </div>

            <div id="carControls" class="control-group" style="display: none;">
              <div class="control">
                <label data-i18n="carCtrl1">車速 (決定初速)</label>
                <select id="speedPreset">
                  <option value="8" data-i18n="carOptS1">慢：8 m/s</option>
                  <option value="12" selected data-i18n="carOptS2">中：12 m/s</option>
                  <option value="16" data-i18n="carOptS3">快：16 m/s</option>
                </select>
              </div>
              <div class="control">
                <label data-i18n="carCtrl2">B 緩衝區設計 (影響停下時間)</label>
                <select id="safetyPreset">
                  <option value="0.12" data-i18n="carOptM1">短緩衝區 (堅硬)：0.12 s</option>
                  <option value="0.20" selected data-i18n="carOptM2">中緩衝區 (可摺曲)：0.20 s</option>
                  <option value="0.30" data-i18n="carOptM3">長緩衝區 (極軟)：0.30 s</option>
                </select>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-head"><h2 class="panel-title" data-i18n="panelReflect">解釋與反思</h2></div>
          <div class="panel">
            <div id="prompt" class="prompt-card">
              <strong id="predictQuestion">預測：哪一個情況的平均撞擊力較大？</strong>
              <div class="qa-options">
                <button data-choice="A" data-i18n="btnA">A 較大</button>
                <button data-choice="B" data-i18n="btnB">B 較大</button>
                <button data-choice="same" data-i18n="btnSame">一樣大</button>
              </div>
              <div id="feedback" class="feedback" style="display:none;"></div>
            </div>

            <div class="explain-box" style="margin-top: 16px;">
              <div><span data-i18n="q1Pre">因為兩者最後都停下，動量改變</span>
                <select id="ans1" class="blank-select">
                  <option value="" data-i18n="optSelect">(請選擇)</option>
                  <option value="same" data-i18n="optSame">相同</option>
                  <option value="larger" data-i18n="optLarger">變大</option>
                  <option value="smaller" data-i18n="optSmaller">變小</option>
                </select>
              </div>
              <div><span data-i18n="q2Pre">而 B 的撞擊時間</span>
                <select id="ans2" class="blank-select">
                  <option value="" data-i18n="optSelect">(請選擇)</option>
                  <option value="longer" data-i18n="optLonger">較長</option>
                  <option value="shorter" data-i18n="optShorter">較短</option>
                  <option value="same" data-i18n="optSame">相同</option>
                </select>
              </div>
              <div><span data-i18n="q3Pre">所以 B 的平均力</span>
                <select id="ans3" class="blank-select">
                  <option value="" data-i18n="optSelect">(請選擇)</option>
                  <option value="larger" data-i18n="optLargerForce">較大</option>
                  <option value="smaller" data-i18n="optSmallerForce">較小</option>
                  <option value="same" data-i18n="optSame">相同</option>
                </select>
              </div>
              <button id="checkBlanksBtn" class="pill-btn" style="margin-top:12px; width:100%; border-color:var(--blue); color:var(--blue);" data-i18n="checkAns">檢查答案</button>
              <div id="blanksFeedback" class="feedback" style="display:none; text-align:center;"></div>
            </div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const NS = "http://www.w3.org/2000/svg";
    const g = 9.81;

    // --- I18N DICTIONARY ---
    const i18n = {
      zh: {
        eyebrow: "⚡ 物理互動實驗室",
        title: "Impulse Lab：動量與撞擊力",
        subtitle: "比較「硬地與軟墊」和「汽車緩衝區」。重點：同一個物體最後停下，動量改變必定相同；停下時間越長，平均力越小。",
        playInit: "▶ 播放模擬", playResume: "▶ 繼續播放", playPause: "⏸ 暫停", playReplay: "▶ 重新播放", reset: "重設",
        tabEggTitle: "A｜情境一：硬地與軟墊",
        tabEggSub: "雞蛋由相同高度跌下，撞地前速率相同，最後都停下。",
        tabCarTitle: "B｜情境二：汽車緩衝區",
        tabCarSub: "同一輛汽車以相同速度前進，最後停下。比較堅硬車身與可摺曲車身。",
        sceneTitleEgg: "情境一：硬地與軟墊",
        sceneTitleCar: "情境二：汽車緩衝區",
        badgeEgg: "相同 Δp → 時間較長 → 力較小",
        panelReadout: "實驗面板", coreFormula: "核心公式", coreDesc: "相同 Δp；Δt 越長，Favg 越小。",
        readoutA_egg: "A 硬地", readoutB_egg: "B 軟墊", readoutA_car: "A 堅硬車身", readoutB_car: "B 緩衝車身",
        avgForceNote: "平均力",
        panelControl: "參數控制",
        eggCtrl1: "下跌高度 (決定初速)", eggCtrl2: "B 軟墊厚度 (影響停下時間)",
        carCtrl1: "車速 (決定初速)", carCtrl2: "B 緩衝區設計 (影響停下時間)",
        eggOptH1: "低：0.5 m", eggOptH2: "中：1.0 m", eggOptH3: "高：1.5 m",
        eggOptM1: "薄軟墊：0.06 s", eggOptM2: "普通軟墊：0.10 s", eggOptM3: "厚軟墊：0.16 s",
        carOptS1: "慢：8 m/s", carOptS2: "中：12 m/s", carOptS3: "快：16 m/s",
        carOptM1: "短緩衝區 (堅硬)：0.12 s", carOptM2: "中緩衝區 (可摺曲)：0.20 s", carOptM3: "長緩衝區 (極軟)：0.30 s",
        panelReflect: "解釋與反思",
        predictEgg: "預測：哪一個情況的平均撞擊力較大？", predictCar: "預測：哪一個情況中，汽車受到的平均力較大？",
        btnA: "A 較大", btnB: "B 較大", btnSame: "一樣大",
        fbInit: "先預測一個答案，再點擊播放鍵觀察。",

    const state = { 
      lang: 'zh',
      mode: 'egg', 
      prediction: null, 
      valuesShown: false, 
      playing: false,
      t: 0, 
      egg: { mass: 0.06, height: 1.0, dtA: 0.015, dtB: 0.10 }, 
      car: { mass: 60, speed: 12, dtA: 0.05, dtB: 0.20 }
    };

    const t = (key) => i18n[state.lang][key] || key;

    function fmtSmart(n) { 
      if (Math.abs(n) >= 100) return Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 }); 
      if (Math.abs(n) >= 10) return Number(n).toLocaleString('en-US', { maximumFractionDigits: 1 }); 
      return Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 }); 
    }
    
    // Half-sine peak factor
    function fMax(fAvg) { return (Math.PI / 2) * fAvg; }

    function currentModel() { 
      if (state.mode === 'egg') { 
        const s = state.egg; const v = Math.sqrt(2 * g * s.height); const dp = s.mass * v; 
        return { dp, dtA: s.dtA, dtB: s.dtB, fAvgA: dp / s.dtA, fAvgB: dp / s.dtB }; 
      }
      const s = state.car; const dp = s.mass * s.speed; 
      return { dp, dtA: s.dtA, dtB: s.dtB, fAvgA: dp / s.dtA, fAvgB: dp / s.dtB }; 
    }

    // --- PURE SVG DRAWING UTILS ---
    function el(name, attrs = {}, parent = null) {
      const node = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([k, v]) => node.setAttribute(k, v));
      if (parent) parent.appendChild(node);
      return node;
    }
    function text(svg, x, y, content, attrs = {}) { const node = el("text", { x, y, ...attrs }, svg); node.textContent = content; return node; }
    function line(svg, x1, y1, x2, y2, attrs = {}) { return el("line", { x1, y1, x2, y2, ...attrs }, svg); }
    function rect(svg, x, y, width, height, attrs = {}) { return el("rect", { x, y, width, height, ...attrs }, svg); }
    function circle(svg, cx, cy, r, attrs = {}) { return el("circle", { cx, cy, r, ...attrs }, svg); }
    function path(svg, d, attrs = {}) { return el("path", { d, ...attrs }, svg); }

    function ensureMarker(svg, color) {
      const hex = color.replace("#", "");
      const id = `arrow-${svg.id || "svg"}-${hex}`;
      let defs = svg.querySelector("defs");
      if (!defs) defs = el("defs", {}, svg);
      if (!svg.querySelector(`#${id}`)) {
        const marker = el("marker", {
          id, markerWidth: 10, markerHeight: 10, refX: 8, refY: 3, orient: "auto", markerUnits: "strokeWidth"
        }, defs);
        path(marker, "M0,0 L0,6 L9,3 z", { fill: color });
      }
      return id;
    }

    function arrow(svg, x1, y1, x2, y2, color = "#2563eb", label = "") {
      const id = ensureMarker(svg, color);
      line(svg, x1, y1, x2, y2, { stroke: color, "stroke-width": 5, "stroke-linecap": "round", "marker-end": `url(#${id})` });
      if (label) {
        text(svg, (x1 + x2) / 2, (y1 + y2) / 2 - 12, label, { "font-size": 17, "font-weight": 900, stroke: "#fff", "stroke-width": 4, "text-anchor": "middle" });
        text(svg, (x1 + x2) / 2, (y1 + y2) / 2 - 12, label, { "font-size": 17, "font-weight": 900, fill: color, "text-anchor": "middle" });
      }
    }

    function drawVectorLeft(svg, xBase, y, w, color, label) {
       const arrowW = Math.max(20, w);
       line(svg, xBase, y, xBase - arrowW, y, {stroke: color, "stroke-width": 6, "stroke-linecap": "round"});
       path(svg, `M ${xBase - arrowW + 12} ${y - 8} L ${xBase - arrowW - 2} ${y} L ${xBase - arrowW + 12} ${y + 8} Z`, {fill: color});
       text(svg, xBase - arrowW/2, y - 12, label, { "font-size": 18, "font-weight": 900, fill: color, "text-anchor": "middle" });
    }

    function setupSVGDefs(svg) {
      let defs = svg.querySelector("defs");
      if (!defs) defs = el("defs", {}, svg);
      defs.innerHTML = "";

      const pattern = el("pattern", { id: "bgGrid", width: 40, height: 40, patternUnits: "userSpaceOnUse" }, defs);
      path(pattern, "M 40 0 L 0 0 0 40", { fill: "none", stroke: "rgba(100, 116, 139, 0.1)", "stroke-width": 1 });

      const matGrad = el("linearGradient", { id: "matGrad", x1: "0", x2: "0", y1: "0", y2: "1" }, defs);
      el("stop", { offset: "0%", "stop-color": "#4ade80" }, matGrad);
      el("stop", { offset: "100%", "stop-color": "#16a34a" }, matGrad);

      const eggGrad = el("radialGradient", { id: "eggGrad", cx: "35%", cy: "35%", r: "70%" }, defs);
      el("stop", { offset: "0%", "stop-color": "#ffffff" }, eggGrad);
      el("stop", { offset: "100%", "stop-color": "#fcd34d" }, eggGrad);

      const filter = el("filter", { id: "glow", x: "-20%", y: "-20%", width: "140%", height: "140%" }, defs);
      el("feGaussianBlur", { stdDeviation: "4", result: "blur" }, filter);
      el("feComposite", { in: "SourceGraphic", in2: "blur", operator: "over" }, filter);

      const redArea = el("linearGradient", { id: "redArea", x1: "0", x2: "0", y1: "0", y2: "1" }, defs);
      el("stop", { offset: "0%", "stop-color": "rgba(220,38,38,0.3)" }, redArea);
      el("stop", { offset: "100%", "stop-color": "rgba(220,38,38,0.0)" }, redArea);

      const greenArea = el("linearGradient", { id: "greenArea", x1: "0", x2: "0", y1: "0", y2: "1" }, defs);
      el("stop", { offset: "0%", "stop-color": "rgba(5,150,105,0.3)" }, greenArea);
      el("stop", { offset: "100%", "stop-color": "rgba(5,150,105,0.0)" }, greenArea);
    }

    // --- SCENE RENDERING ---
    function renderScene() {
      const svg = $("#scene");
      svg.innerHTML = "";
      setupSVGDefs(svg);
      rect(svg, 0, 0, 900, 360, { fill: "url(#bgGrid)" });
      
      const r = currentModel();
      if (state.mode === "egg") renderDropScene(svg, r);
      if (state.mode === "car") renderCrashScene(svg, r);
    }

    function renderDropScene(svg, r) {
      const t_fall = 1.0; 
      const xHard = 250, xSoft = 650;
      const yStart = 60, yFloor = 280;
      const hObj = 32;

      let tau = state.t - t_fall; 
      let yA = yStart, yB = yStart;
      let isContact = false;

      if (state.t < t_fall) {
        const ease = Math.pow(state.t / t_fall, 2);
        yA = yStart + (yFloor - yStart - hObj) * ease;
        yB = yA;
      } else {
        isContact = true;
        yA = yFloor - hObj;
        yB = yFloor - hObj;
      }

      let matDeflect = 0, squashHard = 1, cracked = false;
      
      if (isContact) {
        if (tau <= r.dtB) matDeflect = 35 * Math.sin((tau / r.dtB) * (Math.PI / 2));
        else matDeflect = 35 * Math.exp(-(tau - r.dtB) * 6);

        if (tau <= r.dtA) squashHard = 1 - 0.15 * Math.sin((tau / r.dtA) * (Math.PI / 2));
        else { squashHard = 0.85; cracked = true; }
      }

      yB += matDeflect;

      text(svg, xHard, 30, t("readoutA_egg"), { "font-size": 22, "font-weight": 900, fill: "#dc2626", "text-anchor": "middle" });
      text(svg, xSoft, 30, t("readoutB_egg"), { "font-size": 22, "font-weight": 900, fill: "#059669", "text-anchor": "middle" });
      
      rect(svg, xHard - 120, yFloor, 240, 30, { fill: "#cbd5e1", rx: 6, stroke: "#94a3b8", "stroke-width": 2 }); 
      const mX = xSoft - 130;
      path(svg, `M ${mX} ${yFloor} Q ${xSoft} ${yFloor + matDeflect*2} ${mX+260} ${yFloor} L ${mX+260} ${yFloor+42} L ${mX} ${yFloor+42} Z`, { fill: "url(#matGrad)" });

      drawEgg(svg, xHard, isContact ? yFloor - hObj + (1-squashHard)*10 : yA, squashHard, cracked);
      drawEgg(svg, xSoft, yB, 1, false);

      if (isContact) {
         const maxF = Math.max(r.fAvgA, r.fAvgB);
         if (tau < r.dtA + 0.3) {
            line(svg, xHard + 60, yFloor, xHard + 60, yFloor - 160 * (r.fAvgA / maxF), {stroke: "#dc2626", "stroke-width": 6, "stroke-linecap": "round"});
            path(svg, `M ${xHard+52} ${yFloor - 160 * (r.fAvgA / maxF) + 10} L ${xHard+60} ${yFloor - 160 * (r.fAvgA / maxF) - 4} L ${xHard+68} ${yFloor - 160 * (r.fAvgA / maxF) + 10} Z`, {fill: "#dc2626"});
            text(svg, xHard + 75, yFloor - 80 * (r.fAvgA / maxF) + 5, fmtSmart(r.fAvgA) + " N", { "font-size": 18, "font-weight": 900, fill: "#dc2626" });
         }
         if (tau < r.dtB + 0.3) {
            line(svg, xSoft + 60, yFloor + matDeflect, xSoft + 60, yFloor + matDeflect - 160 * (r.fAvgB / maxF), {stroke: "#059669", "stroke-width": 6, "stroke-linecap": "round"});
            path(svg, `M ${xSoft+52} ${yFloor + matDeflect - 160 * (r.fAvgB / maxF) + 10} L ${xSoft+60} ${yFloor + matDeflect - 160 * (r.fAvgB / maxF) - 4} L ${xSoft+68} ${yFloor + matDeflect - 160 * (r.fAvgB / maxF) + 10} Z`, {fill: "#059669"});
            text(svg, xSoft + 75, yFloor + matDeflect - 80 * (r.fAvgB / maxF) + 5, fmtSmart(r.fAvgB) + " N", { "font-size": 18, "font-weight": 900, fill: "#059669" });
         }
      }
    }

    function drawEgg(svg, cx, cy, scaleY, cracked) {
      // Perfectly horizontal tangents at top and bottom prevent any sharp points!
      const topY = cy - 34 * scaleY;
      const botY = cy + 36 * scaleY;
      const cpTopY = topY; 
      const cpBotY = botY; 
      const dxTop = 28 * scaleY; // Tapered top width
      const dxBot = 44 * scaleY; // Rounded bulbous bottom width
      
      path(svg, `M ${cx} ${topY} C ${cx + dxTop} ${cpTopY}, ${cx + dxBot} ${cpBotY}, ${cx} ${botY} C ${cx - dxBot} ${cpBotY}, ${cx - dxTop} ${cpTopY}, ${cx} ${topY}`, { fill: "url(#eggGrad)", stroke: "#b45309", "stroke-width": 2 });
      
      if (cracked) {
        path(svg, `M ${cx - 20*scaleY} ${cy + 5*scaleY} L ${cx - 10*scaleY} ${cy - 5*scaleY} L ${cx} ${cy + 8*scaleY} L ${cx + 12*scaleY} ${cy - 2*scaleY} L ${cx + 22*scaleY} ${cy + 10*scaleY}`, { fill: "none", stroke: "#1f2937", "stroke-width": 2.5 });
      }
    }

    function renderCrashScene(svg, r) {
      const t_travel = 1.0;
      const xStart = 100, xBarrier = 750;
      
      let xF_A = xStart + 120;
      let xF_B = xStart + 120;
      let isContact = false;
      let tau = state.t - t_travel;

      if (state.t < t_travel) {
         xF_A = xStart + 120 + (xBarrier - xStart - 120) * (state.t / t_travel);
         xF_B = xF_A;
      } else {
         isContact = true;
         xF_A = xBarrier;
         xF_B = xBarrier;
      }

      const yA = 120, yB = 270;
      text(svg, 450, 30, t("sceneA_car"), { "font-size": 22, "font-weight": 900, fill: "#dc2626", "text-anchor": "middle" });
      text(svg, 450, yA + 75, t("sceneB_car"), { "font-size": 22, "font-weight": 900, fill: "#059669", "text-anchor": "middle" });

      line(svg, 50, yA+40, 850, yA+40, { stroke: "#cbd5e1", "stroke-width": 4, "stroke-dasharray": "8,8" });
      line(svg, 50, yB+40, 850, yB+40, { stroke: "#cbd5e1", "stroke-width": 4, "stroke-dasharray": "8,8" });

      rect(svg, xBarrier, yA-30, 20, 70, {fill: "#475569", rx: 4});
      rect(svg, xBarrier, yB-30, 20, 70, {fill: "#475569", rx: 4});

      let sqA = 1, sqB = 1;
      let jerkA = 0, jerkB = 0;

      if (isContact) {
         if (tau <= r.dtA) {
             let progressA = tau / r.dtA;
             sqA = 1 - 0.05 * Math.sin(progressA * Math.PI / 2);
             jerkA = 22 * Math.sin(progressA * Math.PI / 2);
         } else {
             sqA = 0.95; // Stays slightly dented
             jerkA = 22; // Passenger remains thrown against dash
         }
         
         if (tau <= r.dtB) {
            let progressB = tau / r.dtB;
            sqB = 1 - 0.45 * Math.sin(progressB * Math.PI / 2);
            jerkB = 8 * Math.sin(progressB * Math.PI); // Passenger gently moves forward then settles
         } else {
            sqB = 0.55; // Remains permanently crumpled
            jerkB = 0;  // Passenger relaxes back into seat
         }
      }

      drawCar(svg, xF_A, yA, sqA, false, jerkA);
      drawCar(svg, xF_B, yB, sqB, true, jerkB);

      // Forces pointing leftwards
      if (isContact) {
         const maxF = Math.max(r.fAvgA, r.fAvgB);
         if (tau < r.dtA + 0.3) drawVectorLeft(svg, xBarrier - 5, yA - 10, 150 * (r.fAvgA / maxF), "#dc2626", fmtSmart(r.fAvgA) + " N");
         if (tau < r.dtB + 0.3) drawVectorLeft(svg, xBarrier - 5, yB - 10, 150 * (r.fAvgB / maxF), "#059669", fmtSmart(r.fAvgB) + " N");
      }
    }

    function drawCar(svg, xF, cy, squash, isSafe, passengerJerk) {
      const hoodW = 40 * squash;
      const cabinW = 80;
      const carLeft = xF - hoodW - cabinW;
      
      circle(svg, carLeft + 20, cy + 20, 12, { fill: "#111827" });
      circle(svg, carLeft + cabinW + hoodW - 15, cy + 20, 12, { fill: "#111827" });
      
      rect(svg, carLeft + cabinW, cy - 5, hoodW, 20, { fill: isSafe ? "#93c5fd" : "#fca5a5", stroke: "#1e40af", "stroke-width": 2, rx: 4 });
      if (squash < 0.9) {
         let foldX = carLeft + cabinW + hoodW/2;
         line(svg, foldX, cy - 5, foldX - 5, cy + 15, {stroke: "#1e40af", "stroke-width": 2});
         line(svg, foldX + 10, cy - 5, foldX + 5, cy + 15, {stroke: "#1e40af", "stroke-width": 2});
      }
      
      rect(svg, carLeft, cy - 15, cabinW, 30, { fill: isSafe ? "rgba(37,99,235,0.2)" : "rgba(220,38,38,0.2)", stroke: "#1e40af", "stroke-width": 3, rx: 8 });
      path(svg, `M ${carLeft+10} ${cy-15} L ${carLeft+25} ${cy-35} L ${carLeft+65} ${cy-35} L ${carLeft+cabinW} ${cy-15} Z`, { fill: "#bfdbfe", stroke: "#1e40af", "stroke-width": 2 });

      // Passenger 
      const pX = carLeft + 35 + passengerJerk;
      const pY = cy - 10;
      
      line(svg, pX, pY+15, pX, pY-5, { stroke: "#1f2937", "stroke-width": 8, "stroke-linecap": "round" });
      circle(svg, pX, pY - 14, 9, { fill: "#fcd34d" });
      
      // Impact Expressions
      if (passengerJerk > 12 && !isSafe) {
        text(svg, pX, pY - 10, "😵", { "font-size": 13, "text-anchor": "middle" });
        text(svg, pX+16, pY-20, "💥", { "font-size": 18, "text-anchor": "middle" });
      } else {
        text(svg, pX, pY - 10, isSafe ? "😌" : "😐", { "font-size": 13, "text-anchor": "middle" });
      }
      
      // Steering wheel / Dash
      line(svg, carLeft + 65, cy - 5, carLeft + 55, cy - 12, { stroke: "#334155", "stroke-width": 4, "stroke-linecap": "round" });
    }

    // --- GRAPHICS (SPLIT GRAPH) ---
    function renderGraph(r) {
      const svg = $("#graph");
      svg.innerHTML = "";
      setupSVGDefs(svg);
      rect(svg, 0, 0, 900, 330, { fill: "url(#bgGrid)" });

      arrow(svg, 60, 240, 430, 240, "#64748b"); 
      arrow(svg, 60, 240, 60, 40, "#64748b"); 
      text(svg, 410, 260, t("graphTime"), { "font-size": 14, "font-weight": 900, fill: "#475569" });
      text(svg, 20, 52, t("graphForce"), { "font-size": 14, "font-weight": 900, fill: "#475569" });

      arrow(svg, 480, 240, 850, 240, "#64748b"); 
      arrow(svg, 480, 240, 480, 40, "#64748b"); 
      text(svg, 830, 260, t("graphTime"), { "font-size": 14, "font-weight": 900, fill: "#475569" });
      text(svg, 440, 52, t("graphForce"), { "font-size": 14, "font-weight": 900, fill: "#475569" });

      const maxPeak = Math.max(r.fAvgA * fMax(1), r.fAvgB * fMax(1));
      let labelA = state.mode === 'egg' ? t("readoutA_egg") : t("readoutA_car");
      let labelB = state.mode === 'egg' ? t("readoutB_egg") : t("readoutB_car");

      if(state.valuesShown) {
         drawPulse(svg, { x: 100, baseY: 240, dt: r.dtA, Favg: r.fAvgA, maxPeak, label: labelA, color: "#dc2626", gradFill: "url(#redArea)" });
         drawPulse(svg, { x: 520, baseY: 240, dt: r.dtB, Favg: r.fAvgB, maxPeak, label: labelB, color: "#059669", gradFill: "url(#greenArea)" });
      }
    }

    function drawPulse(svg, { x, baseY, dt, Favg, maxPeak, label, color, gradFill }) {
      const timeScale = 500;
      const maxHeight = 160;
      const peak = Favg * fMax(1);
      const w = Math.max(16, dt * timeScale);
      const h = Math.max(4, (peak / maxPeak) * maxHeight);

      const steps = 40;
      let d = `M${x},${baseY}`;
      for (let i = 0; i <= steps; i++) d += ` L${x + (i/steps)*w},${baseY - Math.sin(Math.PI * i / steps) * h}`;
      d += ` L${x + w},${baseY} Z`;
      
      path(svg, d, { fill: gradFill, stroke: color, "stroke-width": 3, filter: "url(#glow)" });
      text(svg, x + w/2, baseY + 24, label, { "font-size": 17, "font-weight": 900, fill: "#0f172a", "text-anchor": "middle" });
      text(svg, x + w/2, baseY - h - 14, `${t("avgForceNote")}: ${fmtSmart(Favg)} N`, { "font-size": 15, "font-weight": 900, fill: color, "text-anchor": "middle" });
      
      path(svg, `M${x},${baseY+35} L${x},${baseY+40} L${x+w},${baseY+40} L${x+w},${baseY+35}`, { fill: "none", stroke: color, "stroke-width": 2 });
      text(svg, x + w/2, baseY+58, `Δt = ${Number(dt.toFixed(3))} s`, { "font-size": 14, "font-weight": 800, fill: color, "text-anchor": "middle" });
    }

    // --- LOGIC & UPDATES ---
    function updateStaticTranslations() {
      document.documentElement.lang = state.lang === 'zh' ? 'zh-Hant' : 'en';
      document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });

      if (state.playing) {
          $("#playBtn").textContent = t("playPause");
      } else if (state.t >= 2.5) {
          $("#playBtn").textContent = t("playReplay");
      } else if (state.t > 0) {
          $("#playBtn").textContent = t("playResume");
      } else {
          $("#playBtn").textContent = t("playInit");
      }
      
      updateTextAndClasses();
      updateFeedback(state.t >= 2.5);
      if ($("#blanksFeedback").style.display === "block") {
          checkBlanks();
      }
    }

    function updateTextAndClasses() { 
      const isEgg = state.mode === 'egg'; 

      $("#sceneTitle").textContent = isEgg ? t("sceneTitleEgg") : t("sceneTitleCar");
      $("#badgeTxt").textContent = t("badgeEgg");
      
      $("#predictQuestion").textContent = isEgg ? t("predictEgg") : t("predictCar");
      $("#eggControls").style.display = isEgg ? 'grid' : 'none'; 
      $("#carControls").style.display = (state.mode === 'car') ? 'grid' : 'none'; 

      $("#readoutLabelA").textContent = isEgg ? t("readoutA_egg") : t("readoutA_car");
      $("#readoutLabelB").textContent = isEgg ? t("readoutB_egg") : t("readoutB_car");
      
      renderScene();
      updateNumbers();
    }

    function updateNumbers() { 
      const m = currentModel(); 
      const show = state.valuesShown; 
      $("#valA").textContent = show ? `${fmtSmart(m.fAvgA)} N` : "—";
      $("#valB").textContent = show ? `${fmtSmart(m.fAvgB)} N` : "—";
      renderGraph(m); 
    }

    function updateFeedback(afterPlay = false) { 
      const feedback = $("#feedback");
      feedback.style.display = "block";
      if (!state.prediction) { 
        feedback.className = 'feedback'; feedback.textContent = t("fbInit"); 
      } else if (!afterPlay) { 
        feedback.className = 'feedback'; 
        let choiceText = state.prediction === 'A' ? t("btnA") : state.prediction === 'B' ? t("btnB") : t("btnSame");
        feedback.textContent = (state.lang === 'zh' ? `你預測了「${choiceText}」。播放後驗證你的想法。` : `You predicted "${choiceText}". Play to verify.`); 
      } else if (state.prediction === 'A') { 
        feedback.className = 'feedback good'; feedback.textContent = t("fbCorrect"); 
      } else if (state.prediction === 'same') { 
        feedback.className = 'feedback warn'; feedback.textContent = t("fbSame"); 
      } else { 
        feedback.className = 'feedback warn'; feedback.textContent = t("fbWrong"); 
      } 
    }

    function checkBlanks() {
      const a1 = $("#ans1").value;
      const a2 = $("#ans2").value;
      const a3 = $("#ans3").value;
      const fb = $("#blanksFeedback");

      $("#ans1").className = "blank-select" + (a1 === "same" ? " correct" : (a1 ? " wrong" : ""));
      $("#ans2").className = "blank-select" + (a2 === "longer" ? " correct" : (a2 ? " wrong" : ""));
      $("#ans3").className = "blank-select" + (a3 === "smaller" ? " correct" : (a3 ? " wrong" : ""));

      if (a1 === "same" && a2 === "longer" && a3 === "smaller") {
        fb.textContent = t("fbBlanksCorrect");
        fb.style.color = "var(--green)";
        fb.style.display = "block";
      } else if (!a1 || !a2 || !a3) {
        fb.textContent = t("fbBlanksIncomplete");
        fb.style.color = "var(--muted)";
        fb.style.display = "block";
      } else {
        fb.textContent = t("fbBlanksWrong");
        fb.style.color = "#dc2626";
        fb.style.display = "block";
      }
    }

    // --- ANIMATION ENGINE ---
    let animFrame = null;
    let lastStamp = null;

    function tick(stamp) {
      if (!state.playing) return;
      if (!lastStamp) lastStamp = stamp;
      const dt = (stamp - lastStamp) / 1000;
      lastStamp = stamp;
      
      state.t += dt;
      
      if (state.t >= 2.5) {
          state.t = 2.5; 
          state.playing = false;
          state.valuesShown = true;
          renderScene();
          updateNumbers();
          updateFeedback(true);
          $("#playBtn").textContent = t("playReplay");
          return; 
      }
      
      renderScene();
      animFrame = requestAnimationFrame(tick);
    }

    function animate() { 
      if (state.playing) {
          state.playing = false;
          cancelAnimationFrame(animFrame);
          $("#playBtn").textContent = t("playResume");
          return;
      }
      if (state.t >= 2.5) state.t = 0;
      
      state.playing = true; 
      state.valuesShown = false; 
      $("#playBtn").textContent = t("playPause");
      updateNumbers();
      
      lastStamp = null;
      if(animFrame) cancelAnimationFrame(animFrame);
      animFrame = requestAnimationFrame(tick);
    }

    // --- EVENT BINDING ---
    function switchTab(mode) { 
      state.playing = false; state.t = 0; state.mode = mode; 
      if(animFrame) cancelAnimationFrame(animFrame);
      $("#playBtn").textContent = t("playInit");

      document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode)); 
      
      state.valuesShown = false; state.prediction = null; 
      document.querySelectorAll('.qa-options button').forEach(b => b.classList.remove('selected', 'correct', 'wrong')); 
      
      $("#ans1").value = ''; $("#ans1").className = "blank-select";
      $("#ans2").value = ''; $("#ans2").className = "blank-select";
      $("#ans3").value = ''; $("#ans3").className = "blank-select";
      $("#blanksFeedback").style.display = "none";
      
      updateFeedback(false); updateTextAndClasses(); 
    }

    function syncControls() { 
      state.egg.height = parseFloat($("#heightPreset").value); 
      state.egg.dtB = parseFloat($("#matPreset").value); 
      state.car.speed = parseFloat($("#speedPreset").value); 
      state.car.dtB = parseFloat($("#safetyPreset").value); 
      state.valuesShown = false; state.t = 0; state.playing = false;
      $("#playBtn").textContent = t("playInit");
      
      $("#ans1").value = ''; $("#ans1").className = "blank-select";
      $("#ans2").value = ''; $("#ans2").className = "blank-select";
      $("#ans3").value = ''; $("#ans3").className = "blank-select";
      $("#blanksFeedback").style.display = "none";
      
      renderScene(); updateNumbers(); 
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.mode))); 
      
      document.querySelectorAll('.qa-options button').forEach(btn => btn.addEventListener('click', (e) => { 
        // Reset all buttons in this group
        e.target.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected', 'correct', 'wrong'));
        
        state.prediction = e.target.dataset.choice; 
        e.target.classList.add('selected');
        
        // Auto-grade immediately if they have already watched the simulation finish
        if (state.t >= 2.5) {
            e.target.classList.remove('selected');
            if (state.prediction === 'A') {
               e.target.classList.add('correct');
            } else {
               e.target.classList.add('wrong');
            }
        }
        
        updateFeedback(state.t >= 2.5); 
      })); 
      
      $("#playBtn").addEventListener('click', animate); 
      $("#resetBtn").addEventListener('click', () => { 
        state.t = 0; state.playing = false; state.valuesShown = false; $("#playBtn").textContent=t("playInit"); 
        
        state.prediction = null;
        document.querySelectorAll('.qa-options button').forEach(b => b.classList.remove('selected', 'correct', 'wrong'));
        
        $("#ans1").value = ''; $("#ans1").className = "blank-select";
        $("#ans2").value = ''; $("#ans2").className = "blank-select";
        $("#ans3").value = ''; $("#ans3").className = "blank-select";
        $("#blanksFeedback").style.display = "none";
        
        renderScene(); updateNumbers(); updateFeedback(false);
      }); 
      $("#checkBlanksBtn").addEventListener('click', checkBlanks); 

      ['heightPreset', 'matPreset', 'speedPreset', 'safetyPreset'].forEach(id => {
        $("#" + id).addEventListener('change', syncControls);
      });
      
      $("#langBtn").addEventListener('click', () => {
        state.lang = state.lang === 'zh' ? 'en' : 'zh';
        $("#langBtn").textContent = state.lang === 'zh' ? '🌐 English' : 'A/中 繁體中文';
        updateStaticTranslations();
      });

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { renderScene(); updateNumbers(); }, 100);
      });

      // Initial Render
      updateStaticTranslations();
    });

  </script>
</body>
</html>
