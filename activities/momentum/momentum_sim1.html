<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1D Momentum Simulator</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        physics: {
                            mass: '#64748b',    // slate-500
                            vel: '#10b981',     // emerald-500
                            mom: '#8b5cf6',     // violet-500
                            wall: '#f43f5e',    // rose-500
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .math-font { font-family: 'Cambria Math', 'Times New Roman', serif; }
        .slider { -webkit-appearance: none; width: 100%; height: 8px; border-radius: 5px; background: #e2e8f0; outline: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
        .slider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
        
        /* Custom scrollbar for clean look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Translation dictionary ---

                step1b: '留意動量方向。',
                step2: '保持質量相同，設定',
                question: '問題：',
                sameSpeedQuestion: '速率相同（4 m/s），為甚麼動量不同？',
                directionAnswer: '答案：因為動量有方向。在這個模擬器中，方向以正負號表示。',
                reboundSimulator: '反彈模擬器',
                playBounce: '播放反彈',
                reset: '重設',
                hideCards: '隱藏計算卡',
                showCards: '顯示碰撞前／後卡',
                incomingV: '撞擊前速度 v',
                challenge: '挑戰',
                reboundQuestion: '如果反彈前後速率相同（例如 5 m/s），動量變化是否等於零？',
                reboundInstruction: '調整滑桿進行測試。播放反彈，然後按「顯示卡」。',
                hideMomentumHint: '隱藏動量箭咀提示',
                showMomentumHint: '顯示動量箭咀提示',
                commonMistake: '常見錯誤提醒！',
                sameSpeedNotMomentum: '速率相同',
                not: '不',
                sameSpeedNotMomentum2: '代表動量相同。請檢查正負號。動量變化不是零！',
                beforeImpact: '1. 碰撞前（初始）',
                afterImpact: '2. 碰撞後（末態）',
                coreConcept: '核心概念',
                changeMomentum: '3. 動量變化',
                hideImpulse: '隱藏衝量細節',
                showImpulse: '顯示進階：衝量',
                impulse: '衝量',
                impulseText: '衝量正正等於動量變化。',
                contactTime: '接觸時間',
                footer1: '謹記：動量取決於質量和速度。在一維情況下，方向以正負號（+ 或 −）表示。',

                    setup: '設定中',
                    playing_in: '撞擊前',
                    playing_out: '反彈中',
                    impact: '撞擊',
                    done: '完成'
                }

        };

        // --- Utility Components ---

        // Helper to consistently format signed numbers
        const fmt = (num, decimals=1) => {
            const val = Number(num).toFixed(decimals).replace(/\.0$/, '');
            return num > 0 ? `+${val}` : val;
        };

        const Arrow = ({ value, colorClass, label, scale = 15, yOffset = 0, strokeWidth = 4, labelPosition = "top" }) => {
            const numericValue = Number(value);
            if (Math.abs(numericValue) < 1e-9) return null;

            const isPositive = numericValue > 0;

            // The vector's visible tip-to-tail length should be proportional to |value|.
            // Draw the arrowhead inside the vector length, not as extra added length.
            const rawLength = Math.abs(numericValue) * scale;
            const vectorLength = Math.min(rawLength, 230);
            const headLength = Math.min(14 + strokeWidth * 0.6, Math.max(5, vectorLength * 0.45), vectorLength);
            const headHalfHeight = Math.min(7 + strokeWidth * 0.4, Math.max(3, vectorLength * 0.25));
            const yMid = 20;
            const shaftEnd = isPositive ? Math.max(0, vectorLength - headLength) : Math.min(vectorLength, headLength);
            const textY = labelPosition === "top" ? 10 : 38;

            const headPoints = isPositive
                ? `${vectorLength},${yMid} ${vectorLength - headLength},${yMid - headHalfHeight} ${vectorLength - headLength},${yMid + headHalfHeight}`
                : `0,${yMid} ${headLength},${yMid - headHalfHeight} ${headLength},${yMid + headHalfHeight}`;

            return (
                <div className="absolute top-1/2 left-1/2 w-0 h-0 flex items-center justify-center pointer-events-none" 
                     style={{ transform: `translate(0, ${yOffset}px)` }}>
                    <svg width={Math.max(vectorLength, 1)} height="40"
                         style={{
                             transform: isPositive ? 'translateX(0px)' : `translateX(-${vectorLength}px)`
                         }}
                         className="overflow-visible absolute">
                        <line x1={isPositive ? 0 : vectorLength} y1={yMid}
                              x2={shaftEnd} y2={yMid}
                              className={`stroke-current ${colorClass}`}
                              strokeWidth={strokeWidth}
                              strokeLinecap="round" />
                        <polygon points={headPoints} className={`fill-current ${colorClass}`} />
                        <text x={vectorLength/2} y={textY} className={`fill-current font-bold text-sm ${colorClass}`} textAnchor="middle">
                            {label}
                        </text>
                    </svg>
                </div>
            );
        };

        const LanguageToggle = ({ lang, setLang, t }) => (
            <button
                onClick={() => setLang(lang === 'en' ? 'zh' : 'en')}
                aria-label={t.switchAria}
                className="fixed top-2 right-3 z-[70] px-4 py-2 rounded-full bg-white/95 text-blue-700 border border-blue-200 shadow-lg font-bold text-sm hover:bg-blue-50 active:scale-95 transition"
            >
                {t.switchLabel}
            </button>
        );

        const SliderCard = ({ title, value, min, max, step, onChange, unit, color }) => (
            <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex-1">
                <div className="flex justify-between items-center mb-2 gap-3">
                    <label className={`font-semibold ${color}`}>{title}</label>
                    <span className="font-mono text-lg font-bold px-2 py-1 bg-gray-50 rounded whitespace-nowrap">
                        {fmt(value)} {unit}
                    </span>
                </div>
                <input type="range" min={min} max={max} step={step} value={value} 
                       onChange={(e) => onChange(Number(e.target.value))} className="slider" />
            </div>
        );

        const MathLine = ({ equation }) => (
            <div className="math-font text-lg md:text-xl bg-slate-50 border border-slate-200 py-2 px-4 rounded-lg text-center my-2 shadow-inner">
                {equation}
            </div>
        );

        const Banner = ({ t }) => (
            <div className="bg-blue-600 text-white text-center py-2 pl-4 pr-36 shadow-md sticky top-0 z-50 flex flex-col md:flex-row justify-center items-center gap-2 md:gap-8">
                <div className="font-bold text-base md:text-lg tracking-wide">
                    <i data-lucide="info" className="inline w-5 h-5 mr-1 mb-1"></i>
                    {t.signConvention}
                </div>
                <div className="text-sm bg-blue-700 px-3 py-1 rounded-full opacity-90">
                    {t.goal}
                </div>
            </div>
        );

        // --- Modules ---

        // MODULE A: Mass vs Velocity
        const ModuleA = ({ t }) => {
            const [mA, setMA] = useState(1.0);
            const [vA, setVA] = useState(2);
            const [mB, setMB] = useState(2.0);
            const [vB, setVB] = useState(2);

            const pA = mA * vA;
            const pB = mB * vB;

            const ObjectRow = ({ name, m, v, p, setM, setV }) => (
                <div className="flex flex-col md:flex-row gap-6 items-center bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                    {/* Controls */}
                    <div className="w-full md:w-1/3 flex flex-col gap-4">
                        <h2 className="text-2xl font-bold text-slate-800 border-b pb-2">{t.object} {name}</h2>
                        <SliderCard title={`${t.mass} (m)`} value={m} min={0.5} max={5.0} step={0.5} unit="kg" onChange={setM} color="text-physics-mass" />
                        <SliderCard title={`${t.velocity} (v)`} value={v} min={-6} max={6} step={1} unit="m/s" onChange={setV} color="text-physics-vel" />
                    </div>
                    
                    {/* Visualization */}
                    <div className="w-full md:w-1/3 h-48 relative bg-slate-50 rounded-xl border border-slate-200 overflow-hidden flex items-center justify-center shadow-inner">
                        <div className="absolute top-1/2 w-full border-t-2 border-dashed border-slate-300"></div>
                        
                        {/* The Object */}
                        <div className="absolute top-1/2 left-1/2 -mt-6 -ml-6 w-12 h-12 bg-physics-mass rounded-lg border-2 border-slate-600 flex items-center justify-center text-white font-bold shadow-lg z-10"
                             style={{ transform: `scale(${0.8 + m * 0.1})` }}>
                            {m}kg
                        </div>
                        
                        {/* Arrows */}
                        <Arrow value={v} colorClass="text-physics-vel" label={t.velocity} yOffset={-45} scale={12} strokeWidth={4} labelPosition="top" />
                        <Arrow value={p} colorClass="text-physics-mom" label={t.momentum} yOffset={45} scale={8} strokeWidth={5} labelPosition="bottom" />
                    </div>

                    {/* Math & Result */}
                    <div className="w-full md:w-1/3 flex flex-col justify-center">
                        <div className="bg-slate-100 p-4 rounded-xl">
                            <h3 className="text-lg font-bold text-slate-700 mb-2">{t.calculation}</h3>
                            <div className="space-y-2">
                                <div className="flex justify-between"><span className="text-physics-mass font-semibold">{t.mass}:</span> <span className="font-mono">{m.toFixed(1)} kg</span></div>
                                <div className="flex justify-between"><span className="text-physics-vel font-semibold">{t.velocity}:</span> <span className="font-mono">{fmt(v)} m/s</span></div>
                                <div className="flex justify-between text-lg border-t border-slate-300 pt-2"><span className="text-physics-mom font-bold">{t.momentum}:</span> <span className="font-mono font-bold">{fmt(p)} kg·m/s</span></div>
                            </div>
                            <div className="mt-4">
                                <MathLine equation={<>p = m &times; v = ({m.toFixed(1)})({fmt(v)}) = <b>{fmt(p)}</b></>} />
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-r-lg">
                        <h3 className="font-bold text-indigo-800 text-lg mb-1">{t.taskCompare}</h3>
                        <p className="text-indigo-900">
                            {t.predictFirst}<br/>
                            {t.keepVelocity}<br/>
                            {t.keepMass}
                        </p>
                    </div>
                    
                    <ObjectRow name="A" m={mA} v={vA} p={pA} setM={setMA} setV={setVA} />
                    <ObjectRow name="B" m={mB} v={vB} p={pB} setM={setMB} setV={setVB} />
                </div>
            );
        };

        // MODULE B: Direction Matters
        const ModuleB = ({ t }) => {
            const [m, setM] = useState(2.0);
            const [v, setV] = useState(3);
            const p = m * v;

            return (
                <div className="flex flex-col lg:flex-row gap-8">
                    {/* Left Column: Visuals & Math */}
                    <div className="w-full lg:w-2/3 flex flex-col gap-6">
                        
                        {/* Big Interactive Area */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-2xl font-bold text-slate-800 mb-6 text-center">{t.numberLineTitle}</h2>
                            
                            <div className="h-64 relative bg-slate-50 rounded-xl border border-slate-200 overflow-hidden flex items-center justify-center shadow-inner mt-4">
                                {/* Axis */}
                                <div className="absolute top-1/2 w-full h-1 bg-slate-300"></div>
                                <div className="absolute top-1/2 left-1/2 w-1 h-6 -mt-3 bg-slate-400"></div>
                                <div className="absolute top-[55%] left-4 text-slate-400 font-bold text-base md:text-lg">{t.negative}</div>
                                <div className="absolute top-[55%] right-4 text-slate-400 font-bold text-base md:text-lg">{t.positive}</div>
                                <div className="absolute top-[55%] left-1/2 -ml-2 text-slate-400 font-bold">0</div>
                                
                                {/* Object */}
                                <div className="absolute top-1/2 left-1/2 -mt-8 w-16 h-16 bg-physics-mass rounded-lg border-2 border-slate-600 flex flex-col items-center justify-center text-white font-bold shadow-lg z-10 transition-transform duration-500 ease-in-out"
                                     style={{ transform: `translateX(-50%) translateX(${v * 15}px) scale(${0.8 + m * 0.1})` }}>
                                    <span>{m}kg</span>
                                </div>
                                
                                {/* Arrows centered on object's visual position */}
                                <div className="absolute top-1/2 left-1/2" style={{ transform: `translateX(${v * 15}px)` }}>
                                    <Arrow value={v} colorClass="text-physics-vel" label={t.velocity} yOffset={-55} scale={15} strokeWidth={4} labelPosition="top" />
                                    <Arrow value={p} colorClass="text-physics-mom" label={t.momentum} yOffset={55} scale={8} strokeWidth={5} labelPosition="bottom" />
                                </div>
                            </div>

                            <div className="mt-8 flex flex-col items-center">
                                <MathLine equation={<>p = m &times; v = ({m.toFixed(1)})({fmt(v)}) = <b className="text-physics-mom text-2xl ml-2">{fmt(p)} kg&middot;m/s</b></>} />
                            </div>
                        </div>
                    </div>

                    {/* Right Column: Controls & Prompts */}
                    <div className="w-full lg:w-1/3 flex flex-col gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-4">
                            <h3 className="text-xl font-bold text-slate-800 border-b pb-2">{t.controls}</h3>
                            <SliderCard title={`${t.mass} (m)`} value={m} min={0.5} max={5.0} step={0.5} unit="kg" onChange={setM} color="text-physics-mass" />
                            <SliderCard title={`${t.velocity} (v)`} value={v} min={-6} max={6} step={1} unit="m/s" onChange={setV} color="text-physics-vel" />
                        </div>

                        <div className="bg-emerald-50 border-l-4 border-emerald-500 p-5 rounded-r-xl shadow-sm">
                            <h3 className="font-bold text-emerald-800 text-lg mb-3">{t.guidedSequence}</h3>
                            <ol className="list-decimal list-inside space-y-3 text-emerald-900">
                                <li>{t.step1} <span className="font-mono font-semibold">m = 1.0</span>, <span className="font-mono font-semibold">v = +4</span>. {t.step1b}</li>
                                <li>{t.step2} <span className="font-mono font-semibold">v = -4</span>.</li>
                                <li className="bg-white p-3 rounded-lg border border-emerald-200 mt-2">
                                    <span className="font-bold text-emerald-700 block mb-1">{t.question}</span>
                                    {t.sameSpeedQuestion}
                                    <p className="text-sm mt-2 font-semibold text-emerald-600 italic">
                                        {t.directionAnswer}
                                    </p>
                                </li>
                            </ol>
                        </div>
                    </div>
                </div>
            );
        };

        // MODULE C: Bounce and Change
        const ModuleC = ({ t }) => {
            const [m, setM] = useState(1.0);
            const [vi, setVi] = useState(5);  // Incoming (positive, moving right)
            const vf = -vi; // Outgoing automatically negative of incoming
            
            // Optional features
            const [showImpulse, setShowImpulse] = useState(false);
            const [dt, setDt] = useState(0.2); // Contact time
            
            // UI State
            const [animState, setAnimState] = useState('setup');
            const [showValues, setShowValues] = useState(false); 
            const [showHintArrow, setShowHintArrow] = useState(false);

            // Physics & DOM Refs for silky-smooth 60fps animation without React re-render jitter
            const trackRef = useRef(null);
            const objectRef = useRef(null);
            const arrowRef = useRef(null);
            const requestRef = useRef();
            
            const animStateRef = useRef('setup');
            const startTimeRef = useRef(0);
            const startXRef = useRef(50);
            
            const [trackWidth, setTrackWidth] = useState(600);

            const pi = m * vi;
            const pf = m * vf;
            const deltaP = pf - pi;
            const Favg = deltaP / dt;

            // Track resizing to guarantee the object perfectly hits the wall regardless of screen size
            useEffect(() => {
                if (!trackRef.current) return;
                const observer = new ResizeObserver(entries => {
                    setTrackWidth(entries[0].contentRect.width);
                });
                observer.observe(trackRef.current);
                return () => observer.disconnect();
            }, []);

            // Layout Constants
            const START_X = 50; 
            // MaxX calculation: Track Width - 40px(right offset) - 24px(wall width) - 80px(object width)
            const MAX_X = Math.max(START_X + 50, trackWidth - 144); 
            // Fix: Decreased the visual speed ratio. Now 6m/s takes 2.5 seconds to cross the track instead of 1 second.
            const pxPerMeter = (MAX_X - START_X) / 15; 

            // Keep a fresh reference to params so the animation loop never uses stale closures
            const simParams = useRef({ vi, vf, MAX_X, pxPerMeter });
            useEffect(() => {
                simParams.current = { vi, vf, MAX_X, pxPerMeter };
            }, [vi, vf, MAX_X, pxPerMeter]);

            // Ensure object is cleanly set at start position when in setup
            useEffect(() => {
                if (animState === 'setup') {
                    if (objectRef.current) objectRef.current.style.transform = `translateX(${START_X}px)`;
                    if (arrowRef.current) arrowRef.current.style.transform = `translateX(${START_X + 40}px)`;
                }
            }, [animState, START_X]);

            const resetAnim = () => {
                cancelAnimationFrame(requestRef.current);
                animStateRef.current = 'setup';
                setAnimState('setup');
                setShowValues(false);
                setShowHintArrow(false);
            };

            const playAnim = () => {
                if (animStateRef.current === 'setup' || animStateRef.current === 'done') {
                    animStateRef.current = 'playing_in';
                    setAnimState('playing_in');
                    setShowValues(false);
                    startXRef.current = START_X;
                    startTimeRef.current = performance.now();
                    requestRef.current = requestAnimationFrame(updateAnimation);
                }
            };

            const toggleValues = () => {
                setShowValues(!showValues);
            };

            // High-performance animation loop (bypassing React state for positional updates)
            const updateAnimation = (time) => {
                if (!startTimeRef.current) startTimeRef.current = time;
                const elapsed = (time - startTimeRef.current) / 1000; // seconds
                const params = simParams.current;
                
                let nextX = startXRef.current;
                
                if (animStateRef.current === 'playing_in') {
                    // Constant velocity physics: x = x0 + v * t
                    nextX = startXRef.current + (params.vi * params.pxPerMeter * elapsed);
                    
                    if (nextX >= params.MAX_X) {
                        nextX = params.MAX_X;
                        
                        // Instantaneous elastic bounce (no pause)
                        animStateRef.current = 'playing_out';
                        setAnimState('playing_out');
                        
                        startXRef.current = params.MAX_X;
                        startTimeRef.current = time;
                    }
                } else if (animStateRef.current === 'playing_out') {
                    nextX = startXRef.current + (params.vf * params.pxPerMeter * elapsed); // vf is negative
                    
                    if (nextX <= START_X) {
                        nextX = START_X;
                        animStateRef.current = 'done';
                        setAnimState('done');
                        if (objectRef.current) objectRef.current.style.transform = `translateX(${START_X}px)`;
                        if (arrowRef.current) arrowRef.current.style.transform = `translateX(${START_X + 40}px)`;
                        return; // Halt loop when finished
                    }
                }
                
                // Direct DOM update eliminates all stuttering/jitter
                if (objectRef.current) objectRef.current.style.transform = `translateX(${nextX}px)`;
                if (arrowRef.current) arrowRef.current.style.transform = `translateX(${nextX + 40}px)`;
                
                requestRef.current = requestAnimationFrame(updateAnimation);
            };

            // Cleanup loop
            useEffect(() => {
                return () => cancelAnimationFrame(requestRef.current);
            }, []);

            // Ensure values are reset if sliders change
            useEffect(() => {
                resetAnim();
            }, [m, vi]);

            return (
                <div className="flex flex-col xl:flex-row gap-6">
                    {/* Left/Main Column: Simulation */}
                    <div className="w-full xl:w-7/12 flex flex-col gap-4">
                        
                        {/* Simulation Screen */}
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-2xl font-bold text-slate-800 mb-4 flex justify-between items-center gap-4">
                                <span>{t.reboundSimulator}</span>
                                <span className={`px-3 py-1 text-sm rounded-full font-mono font-bold ${animState==='setup'?'bg-gray-100 text-gray-500': animState==='playing_in'?'bg-blue-100 text-blue-700': animState==='impact'?'bg-red-100 text-red-700': 'bg-purple-100 text-purple-700'}`}>
                                    {t.status[animState] || animState}
                                </span>
                            </h2>
                            
                            <div ref={trackRef} className="h-64 relative bg-slate-900 rounded-xl overflow-hidden shadow-inner border-4 border-slate-800">
                                {/* Background Grid Lines */}
                                <div className="absolute inset-0 opacity-20" style={{backgroundImage: 'linear-gradient(#334155 1px, transparent 1px), linear-gradient(90deg, #334155 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                                
                                {/* Track Line */}
                                <div className="absolute top-[60%] w-full h-1 bg-slate-600"></div>
                                
                                {/* Wall */}
                                <div className="absolute top-[20%] bottom-[20%] right-10 w-6 bg-physics-wall rounded-l-lg border-l-4 border-rose-400 shadow-[0_0_15px_rgba(244,63,94,0.5)] z-20"></div>
                                
                                {/* The Object */}
                                <div ref={objectRef}
                                     className="absolute left-0 top-[60%] -mt-10 w-20 h-20 rounded-xl border-4 border-slate-400 flex flex-col items-center justify-center text-white font-bold shadow-lg z-30 transition-colors duration-200"
                                     style={{ backgroundColor: animState === 'impact' ? '#f59e0b' : '#3b82f6' }}>
                                    <span className="text-xl">{m} kg</span>
                                </div>

                                {/* Dynamic Velocity Arrow on Object */}
                                <div ref={arrowRef} 
                                     className={`absolute left-0 top-[60%] z-40 w-0 h-0 transition-opacity duration-100 ${animState === 'playing_in' || animState === 'playing_out' ? 'opacity-100' : 'opacity-0'}`}>
                                     <Arrow value={animState === 'playing_out' ? vf : vi} colorClass="text-physics-vel" label={t.velocity} yOffset={-55} scale={15} strokeWidth={4} labelPosition="top" />
                                     
                                     {/* Momentum Hint Arrow */}
                                     {showHintArrow && (
                                         <Arrow value={animState === 'playing_out' ? pf : pi} colorClass="text-physics-mom" label={t.momentum} yOffset={55} scale={8} strokeWidth={5} labelPosition="bottom" />
                                     )}
                                </div>
                            </div>

                            {/* Playback Controls */}
                            <div className="mt-6 flex flex-wrap gap-4 justify-center">
                                <button onClick={playAnim} disabled={animState === 'playing_in' || animState === 'playing_out'} 
                                        className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md disabled:opacity-50 flex items-center gap-2 transition-transform active:scale-95">
                                    <i data-lucide="play" className="w-5 h-5"></i> {t.playBounce}
                                </button>
                                <button onClick={resetAnim}
                                        className="px-6 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold rounded-xl shadow-md flex items-center gap-2 transition-transform active:scale-95">
                                    <i data-lucide="rotate-ccw" className="w-5 h-5"></i> {t.reset}
                                </button>
                                <button onClick={toggleValues}
                                        className={`px-6 py-3 font-bold rounded-xl shadow-md flex items-center gap-2 transition-all active:scale-95 ${showValues ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-amber-100 text-amber-800 border-2 border-amber-500 hover:bg-amber-200'}`}>
                                    <i data-lucide="eye" className="w-5 h-5"></i> {showValues ? t.hideCards : t.showCards}
                                </button>
                            </div>
                        </div>

                        {/* Controls */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <SliderCard title={`${t.mass} (m)`} value={m} min={0.5} max={5.0} step={0.5} unit="kg" onChange={setM} color="text-physics-mass" />
                            <SliderCard title={`${t.incomingV} (v_i)`} value={vi} min={1} max={6} step={1} unit="m/s" onChange={setVi} color="text-physics-vel" />
                        </div>
                    </div>

                    {/* Right Column: Calculations & Data Cards */}
                    <div className="w-full xl:w-5/12 flex flex-col gap-4">
                        
                        {/* Instructional Prompt Box */}
                        <div className="bg-rose-50 border-l-4 border-rose-500 p-4 rounded-r-xl shadow-sm">
                            <h3 className="font-bold text-rose-800 text-lg mb-2">{t.challenge}</h3>
                            <p className="text-rose-900 mb-2">
                                {t.reboundQuestion}
                            </p>
                            <p className="text-sm font-semibold text-rose-700 italic">
                                {t.reboundInstruction}
                            </p>
                            
                            <button 
                                onClick={() => setShowHintArrow(!showHintArrow)}
                                className="mt-3 text-sm font-bold text-rose-700 hover:text-rose-900 bg-rose-200 px-3 py-1.5 rounded-md transition-colors flex items-center gap-2"
                            >
                                <i data-lucide="help-circle" className="w-4 h-4"></i>
                                <span>{showHintArrow ? t.hideMomentumHint : t.showMomentumHint}</span>
                            </button>
                            
                            {/* Misconception Alert Trigger */}
                            { Math.abs(vi) === Math.abs(vf) && showValues && (
                                <div className="mt-3 bg-red-100 border border-red-400 text-red-800 px-4 py-3 rounded relative" role="alert">
                                    <strong className="font-bold block mb-1">{t.commonMistake}</strong>
                                    <span className="block sm:inline">{t.sameSpeedNotMomentum}<b>{t.not}</b>{t.sameSpeedNotMomentum2}</span>
                                </div>
                            )}
                        </div>

                        {/* Calculation Cards container - visually hidden until button clicked to enforce 'predict first' */}
                        <div className={`transition-opacity duration-500 flex flex-col gap-4 ${showValues ? 'opacity-100' : 'opacity-30 pointer-events-none filter blur-sm'}`}>
                            
                            {/* Before Impact Card */}
                            <div className="bg-white p-4 rounded-xl shadow-sm border-l-8 border-slate-400">
                                <h3 className="font-bold text-slate-700 text-lg border-b pb-2 mb-2 flex justify-between">
                                    <span>{t.beforeImpact}</span>
                                </h3>
                                <div className="flex justify-between items-center">
                                    <div className="text-lg">
                                        <MathLine equation={<>p<sub>i</sub> = m &times; v<sub>i</sub> = ({m})({fmt(vi)})</>} />
                                    </div>
                                    <div className="text-2xl font-bold font-mono bg-slate-100 px-3 py-1 rounded text-physics-mom">
                                        {fmt(pi)}
                                    </div>
                                </div>
                            </div>

                            {/* After Impact Card */}
                            <div className="bg-white p-4 rounded-xl shadow-sm border-l-8 border-slate-600">
                                <h3 className="font-bold text-slate-700 text-lg border-b pb-2 mb-2 flex justify-between">
                                    <span>{t.afterImpact}</span>
                                </h3>
                                <div className="flex justify-between items-center">
                                    <div className="text-lg">
                                        <MathLine equation={<>p<sub>f</sub> = m &times; v<sub>f</sub> = ({m})({fmt(vf)})</>} />
                                    </div>
                                    <div className="text-2xl font-bold font-mono bg-slate-100 px-3 py-1 rounded text-physics-mom">
                                        {fmt(pf)}
                                    </div>
                                </div>
                            </div>

                            {/* Change in Momentum Card */}
                            <div className="bg-gradient-to-br from-purple-50 to-indigo-50 p-5 rounded-xl shadow-md border border-purple-200 relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-purple-200 text-purple-800 px-3 py-1 rounded-bl-lg font-bold text-sm">{t.coreConcept}</div>
                                <h3 className="font-bold text-purple-900 text-xl border-b border-purple-200 pb-2 mb-3">
                                    {t.changeMomentum} (&Delta;p)
                                </h3>
                                <div className="text-center mb-4">
                                    <MathLine equation={<>&Delta;p = p<sub>f</sub> - p<sub>i</sub></>} />
                                    <MathLine equation={<>&Delta;p = ({fmt(pf)}) - ({fmt(pi)})</>} />
                                </div>
                                <div className="text-center">
                                    <span className="text-4xl font-bold font-mono text-white bg-physics-mom px-6 py-2 rounded-xl shadow-inner inline-block">
                                        {fmt(deltaP)} <span className="text-xl">kg&middot;m/s</span>
                                    </span>
                                </div>
                            </div>

                            {/* Impulse Toggle */}
                            <div className="mt-2 text-center">
                                <button onClick={() => setShowImpulse(!showImpulse)} className="text-sm font-bold text-indigo-600 hover:text-indigo-800 underline">
                                    {showImpulse ? t.hideImpulse : t.showImpulse}
                                </button>
                            </div>

                            {/* Optional Impulse Card */}
                            {showImpulse && (
                                <div className="bg-white p-4 rounded-xl shadow border border-indigo-200 mt-2 animate-fade-in">
                                    <h3 className="font-bold text-indigo-800 text-lg border-b pb-2 mb-2">{t.impulse} (J)</h3>
                                    <p className="text-sm text-gray-600 mb-2">{t.impulseText}</p>
                                    <MathLine equation={<>J = &Delta;p = <b>{fmt(deltaP)} N&middot;s</b></>} />
                                    
                                    <div className="mt-4 pt-4 border-t border-gray-100">
                                        <SliderCard title={`${t.contactTime} (Δt)`} value={dt} min={0.05} max={0.50} step={0.05} unit="s" onChange={setDt} color="text-indigo-600" />
                                        <div className="mt-3">
                                            <MathLine equation={<>F<sub>avg</sub> = &Delta;p / &Delta;t = ({fmt(deltaP)}) / ({dt.toFixed(2)}) = <b>{fmt(Favg)} N</b></>} />
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                        
                    </div>
                </div>
            );
        };


        // --- Main Application Wrapper ---

        const App = () => {
            const [activeTab, setActiveTab] = useState('mass');
            const [lang, setLang] = useState('en');
            const t = I18N[lang];

            // Force Lucide icons to render after mount/tab/language change
            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                document.documentElement.lang = t.htmlLang;
                document.title = t.title;
            }, [t]);

            return (
                <div className="min-h-screen flex flex-col">
                    <LanguageToggle lang={lang} setLang={setLang} t={t} />
                    <Banner t={t} />
                    
                    {/* Header Area */}
                    <div className="bg-white shadow-sm border-b border-gray-200 sticky top-[52px] md:top-[40px] z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-4">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-4 pr-0 md:pr-28">
                                <h1 className="text-3xl font-extrabold text-slate-800 flex items-center gap-3 text-center md:text-left">
                                    <div className="bg-blue-600 text-white p-2 rounded-lg"><i data-lucide="activity" className="w-6 h-6"></i></div>
                                    {t.title}
                                </h1>
                            </div>
                            
                            {/* Navigation Tabs */}
                            <div className="flex space-x-1 overflow-x-auto pb-px">
                                <button onClick={() => setActiveTab('mass')} className={`px-4 py-3 font-bold text-sm md:text-base rounded-t-lg transition-colors whitespace-nowrap flex items-center gap-2 ${activeTab === 'mass' ? 'bg-indigo-50 text-indigo-700 border-b-4 border-indigo-600' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-700'}`}>
                                    <i data-lucide="scale" className="w-5 h-5"></i> {t.moduleA}
                                </button>
                                <button onClick={() => setActiveTab('direction')} className={`px-4 py-3 font-bold text-sm md:text-base rounded-t-lg transition-colors whitespace-nowrap flex items-center gap-2 ${activeTab === 'direction' ? 'bg-emerald-50 text-emerald-700 border-b-4 border-emerald-600' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-700'}`}>
                                    <i data-lucide="move-horizontal" className="w-5 h-5"></i> {t.moduleB}
                                </button>
                                <button onClick={() => setActiveTab('bounce')} className={`px-4 py-3 font-bold text-sm md:text-base rounded-t-lg transition-colors whitespace-nowrap flex items-center gap-2 ${activeTab === 'bounce' ? 'bg-purple-50 text-purple-700 border-b-4 border-purple-600' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-700'}`}>
                                    <i data-lucide="flip-horizontal" className="w-5 h-5"></i> {t.moduleC}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {activeTab === 'mass' && <ModuleA t={t} />}
                        {activeTab === 'direction' && <ModuleB t={t} />}
                        {activeTab === 'bounce' && <ModuleC t={t} />}
                    </main>
                    
                    {/* Footer */}
                    <footer className="bg-slate-800 text-slate-300 py-6 px-4 text-center text-sm">
                        <p>{t.footer1}</p>
                        <p className="mt-2 text-slate-500 font-mono text-xs">p = mv | Δp = p_f - p_i</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
